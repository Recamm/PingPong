<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torneo Ping Pong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!--  PHASE 0 — SETUP                                            -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <section id="phase-setup" class="phase active">
    <div class="setup-bg"></div>
    <a class="gh-badge" href="https://github.com/recamm/PingPong" target="_blank" rel="noopener" title="Ver en GitHub">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub
    </a>
    <div class="setup-content">
      <div class="logo-mark">🏓</div>
      <h1 class="site-title">TORNEO<br><span>PING PONG</span></h1>

      <div class="setup-card">
        <label class="field-label" for="tournament-name">Nombre del torneo</label>
        <input id="tournament-name" class="field-input" type="text" placeholder="ej: Copa POLI 2026" maxlength="50" />

        <div class="teams-header">
          <label class="field-label">Equipos <span id="team-count" class="badge">0</span></label>
          <div class="team-add-row">
            <input id="team-name-input" class="field-input" type="text" placeholder="Nombre del equipo" maxlength="30" />
            <button id="btn-add-team" class="btn btn-accent">+</button>
          </div>
        </div>

        <ul id="teams-list" class="teams-list"></ul>

        <p id="setup-hint" class="hint">Agregá al menos 8 equipos para comenzar.</p>

        <button id="btn-start" class="btn btn-primary" disabled>INICIAR TORNEO</button>
      </div>
    </div>
  </section>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!--  PHASE 1 — GROUPS                                           -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <section id="phase-groups" class="phase">
    <header class="top-bar">
      <div class="top-bar-left">
        <button id="btn-back-groups" class="btn btn-ghost">← Volver</button>
        <div>
          <span class="phase-label">Fase de Grupos</span>
          <h2 id="groups-title" class="phase-title"></h2>
        </div>
      </div>
      <div class="top-bar-right">
        <button id="btn-reset-groups" class="btn btn-ghost btn-reset-inline">↺ Reiniciar</button>
        <button id="btn-advance-groups" class="btn btn-primary" disabled>Pasar a Cuartos →</button>
      </div>
    </header>

    <div class="groups-layout">
      <!-- Groups & fixtures injected by JS -->
      <div id="groups-container" class="groups-container"></div>
    </div>
  </section>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!--  PHASE 2 — KNOCKOUT                                         -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <section id="phase-knockout" class="phase">
    <header class="top-bar">
      <div class="top-bar-left">
        <button id="btn-back-knockout" class="btn btn-ghost">← Volver</button>
        <div>
          <span class="phase-label">Fase Eliminatoria</span>
          <h2 id="knockout-title" class="phase-title"></h2>
        </div>
      </div>
      <div class="top-bar-right">
        <button id="btn-reset-knockout" class="btn btn-ghost btn-reset-inline">↺ Reiniciar</button>
        <button id="btn-advance-knockout" class="btn btn-primary" disabled>Ver Podio →</button>
      </div>
    </header>

    <div class="bracket-wrapper">
      <!-- QF -->
      <div class="bracket-round" id="round-qf">
        <div class="round-label">Cuartos de Final</div>
        <div class="bracket-matches" id="qf-matches"></div>
      </div>
      <!-- SF -->
      <div class="bracket-round" id="round-sf">
        <div class="round-label">Semifinales</div>
        <div class="bracket-matches" id="sf-matches"></div>
      </div>
      <!-- FINAL + 3RD -->
      <div class="bracket-round" id="round-final">
        <div class="round-label">Final</div>
        <div class="bracket-matches" id="final-matches"></div>
      </div>
    </div>
  </section>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!--  PHASE 3 — PODIUM                                           -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <section id="phase-podium" class="phase">
    <header class="top-bar">
      <div class="top-bar-left">
        <button id="btn-back-podium" class="btn btn-ghost">← Ver Bracket</button>
      </div>
      <div class="top-bar-right">
        <button id="btn-reset-podium" class="btn btn-ghost btn-reset-inline">↺ Reiniciar</button>
      </div>
    </header>
    <div class="podium-bg"></div>
    <div class="podium-content">
      <h2 class="podium-headline">CAMPEÓN</h2>
      <div class="podium-stage">
        <div class="podium-place podium-2nd">
          <div class="podium-medal">🥈</div>
          <div class="podium-team" id="podium-2nd">—</div>
          <div class="podium-bar bar-2nd"></div>
        </div>
        <div class="podium-place podium-1st">
          <div class="podium-medal">🥇</div>
          <div class="podium-team podium-champ" id="podium-1st">—</div>
          <div class="podium-bar bar-1st"></div>
        </div>
        <div class="podium-place podium-3rd">
          <div class="podium-medal">🥉</div>
          <div class="podium-team" id="podium-3rd">—</div>
          <div class="podium-bar bar-3rd"></div>
        </div>
      </div>

    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
