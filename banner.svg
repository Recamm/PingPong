<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0f0e"/>
      <stop offset="100%" stop-color="#111614"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="0%" r="60%">
      <stop offset="0%"   stop-color="#3ddc84" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3ddc84" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <rect width="1200" height="300" fill="url(#glowGrad)"/>

  <!-- Grid lines -->
  <g stroke="#3ddc84" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="60"  x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Green accent top bar -->
  <rect x="0" y="0" width="1200" height="3" fill="#3ddc84" opacity="0.9"/>

  <!-- Left decorative bracket visual -->
  <g transform="translate(60, 55)" opacity="0.18" stroke="#3ddc84" stroke-width="1.5" fill="none">
    <!-- mini bracket lines -->
    <line x1="0"  y1="20"  x2="40" y2="20"/>
    <line x1="0"  y1="60"  x2="40" y2="60"/>
    <line x1="40" y1="20"  x2="40" y2="60"/>
    <line x1="40" y1="40"  x2="80" y2="40"/>

    <line x1="0"  y1="110" x2="40" y2="110"/>
    <line x1="0"  y1="150" x2="40" y2="150"/>
    <line x1="40" y1="110" x2="40" y2="150"/>
    <line x1="40" y1="130" x2="80" y2="130"/>

    <line x1="80" y1="40"  x2="80" y2="130"/>
    <line x1="80" y1="85"  x2="120" y2="85"/>
  </g>

  <!-- Ping pong paddle (right side) -->
  <g transform="translate(975, 60) rotate(-20)">
    <!-- Paddle head -->
    <ellipse cx="60" cy="55" rx="52" ry="55" fill="#1e2421" stroke="#3ddc84" stroke-width="2"/>
    <ellipse cx="60" cy="55" rx="42" ry="45" fill="#2ba863" opacity="0.35"/>
    <!-- Handle -->
    <rect x="44" y="102" width="32" height="80" rx="10" fill="#1e2421" stroke="#3ddc84" stroke-width="1.5"/>
    <!-- Center line on paddle -->
    <line x1="60" y1="10" x2="60" y2="100" stroke="#3ddc84" stroke-opacity="0.3" stroke-width="1.5"/>
    <!-- Ball -->
    <circle cx="148" cy="28" r="18" fill="#f0f4f2" opacity="0.9"/>
    <circle cx="148" cy="28" r="18" fill="none" stroke="#e0e0e0" stroke-width="1"/>
    <!-- Ball curve lines -->
    <path d="M132 22 Q148 15 164 22" fill="none" stroke="#ccc" stroke-width="1.2" opacity="0.6"/>
    <path d="M132 34 Q148 41 164 34" fill="none" stroke="#ccc" stroke-width="1.2" opacity="0.6"/>
  </g>

  <!-- Main title -->
  <text x="210" y="148"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="82"
    font-weight="900"
    letter-spacing="6"
    fill="#f0f4f2">TORNEO</text>

  <text x="210" y="228"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="82"
    font-weight="900"
    letter-spacing="6"
    fill="#3ddc84"
    filter="url(#glow)">PING PONG</text>

  <!-- Subtitle -->
  <text x="213" y="260"
    font-family="'Arial', sans-serif"
    font-size="14"
    font-weight="400"
    letter-spacing="4"
    fill="#6b7c77">GESTIÓN DE TORNEOS · FASE DE GRUPOS · BRACKET ELIMINATORIO</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="297" width="1200" height="3" fill="#3ddc84" opacity="0.5"/>
</svg>
